# ─── Application ───
spring.application.name=Hospital-Appointment-System

# ─── Datasource (Aiven Cloud MySQL) ───
# NOTE: Do NOT commit real credentials. Override with env vars or a local config.
spring.datasource.url=jdbc:mysql://has-yadavidaikaadar-69aa.j.aivencloud.com:24967/defaultdb?sslMode=REQUIRED
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ───
# NOTE: Set a strong secret via an environment variable when running in production.
app.jwt.secret=${JWT_SECRET:change_me}
app.jwt.expiration-ms=86400000

# ─── Swagger / OpenAPI ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ─── Server ───
server.port=8080
